<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Greeting Result</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: siteHeader('hello')}"></div>

<main class="wrap narrow">
    <section class="card">
        <p class="eyebrow">Rendered result</p>
        <h1>Hello, <span th:text="${name}">Friend</span>!</h1>
        <p th:text="${message}">Welcome message</p>

        <div class="callout">
            <strong>Current topic:</strong>
            <span th:text="${topic}">Spring templates</span>
        </div>

        <div class="callout success" th:if="${showTemplateTip}">
            <strong>Template tip:</strong>
            Move repeated page sections like navbars and footers into fragments so your templates stay smaller and easier to maintain.
        </div>

        <div class="actions">
            <a class="btn primary" th:href="@{/hello}">Try Again</a>
            <a class="btn" th:href="@{/}">Back to Home</a>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: siteFooter(${year})}"></div>
</body>
</html>
