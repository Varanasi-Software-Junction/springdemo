<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Greeting Form</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: siteHeader('hello')}"></div>

<main class="wrap narrow">
    <section class="card form-card">
        <p class="eyebrow">Template form demo</p>
        <h1>Send values from HTML to Spring</h1>
        <p>Fill the form below. Spring will bind the values into a Java object and render a result template.</p>

        <form th:action="@{/hello}" th:object="${form}" method="post" class="stack">
            <label>
                <span>Name</span>
                <input type="text" th:field="*{name}" placeholder="Enter your name">
            </label>

            <label>
                <span>Topic</span>
                <input type="text" th:field="*{topic}" placeholder="Example: Thymeleaf fragments">
            </label>

            <label class="check-row">
                <input type="checkbox" th:field="*{wantsTemplates}">
                <span>Show me an extra template tip on the result page</span>
            </label>

            <button type="submit" class="btn primary">Render Result Page</button>
        </form>
    </section>
</main>

<div th:replace="~{fragments/layout :: siteFooter(${year})}"></div>
</body>
</html>
